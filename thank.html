<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Thank You — DestinationPick × Meliá Weddings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Dancing+Script:wght@400;500;600;700&family=Inter:wght@300;400;500;600&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --cloud:#ffffff;--ink:#1b1b1b;--sky:#426188;--azure:#2b7fff;
  --lift:#9ec3ff;--muted:#5e5e5e;--muted-2:#8a8a8a;--border:rgba(27,27,27,.12);
  --glass:rgba(255,255,255,.42);--glass-bd:rgba(255,255,255,.6);
  --blur:blur(16px) saturate(140%);
  --display:'Oswald',ui-sans-serif,sans-serif;
  --script:'Dancing Script',cursive;
  --head:'Montserrat',ui-sans-serif,sans-serif;
  --sans:'Inter',system-ui,sans-serif;
  --r-btn:8px;--r-card:14px;
}
html{scroll-behavior:smooth;background:#cfe0f3}
body{
  font-family:var(--sans);background:transparent;color:var(--ink);
  overflow-x:hidden;min-height:100vh;display:flex;align-items:center;justify-content:center;
  -webkit-font-smoothing:antialiased;
}
body::before{
  content:'';position:fixed;inset:0;z-index:-2;pointer-events:none;
  background:
    radial-gradient(1100px 720px at 12% 16%,rgba(255,255,255,.78),transparent 62%),
    radial-gradient(900px 600px at 88% 26%,rgba(168,200,233,.6),transparent 60%),
    radial-gradient(1200px 820px at 72% 88%,rgba(233,221,201,.5),transparent 62%),
    linear-gradient(180deg,#a9c8e8 0%,#c4daf0 30%,#dde9f7 62%,#eef2ec 100%);
}
a{color:inherit;text-decoration:none}

.thank-wrap{
  position:relative;width:100%;min-height:100vh;
  display:flex;align-items:center;justify-content:center;padding:3rem 1.5rem;
}
.thank-card{
  position:relative;z-index:2;text-align:center;max-width:580px;
  background:var(--glass);
  -webkit-backdrop-filter:var(--blur);backdrop-filter:var(--blur);
  border:1px solid var(--glass-bd);border-radius:var(--r-card);
  padding:4rem 3rem;box-shadow:0 20px 60px rgba(27,27,27,0.08);
}
.thank-icon{
  font-family:var(--script);font-size:3rem;color:var(--sky);
  margin-bottom:1rem;animation:bounceIn 0.6s ease;
}
@keyframes bounceIn{
  0%{transform:scale(0.3);opacity:0}
  50%{transform:scale(1.1)}
  100%{transform:scale(1);opacity:1}
}
.thank-title{
  font-family:var(--head);font-size:clamp(2rem,5vw,3rem);
  font-weight:600;color:var(--ink);margin-bottom:0.5rem;line-height:1.15;
}
.thank-title em{
  font-family:var(--script);font-style:normal;font-weight:700;color:var(--sky);
}
.thank-line{width:32px;height:1.5px;background:var(--sky);margin:1.5rem auto}
.thank-body{
  font-size:0.95rem;color:var(--muted);line-height:1.8;margin-bottom:1.5rem;
}
.thank-body strong{color:var(--ink);font-weight:600}
.thank-note{
  font-size:0.85rem;color:var(--muted-2);font-style:italic;margin-bottom:2rem;
}
.thank-btn{
  display:inline-block;font-family:var(--sans);font-size:.7rem;font-weight:600;
  letter-spacing:.13em;text-transform:uppercase;padding:.9rem 2rem;
  border:1.5px solid var(--azure);border-radius:var(--r-btn);color:var(--ink);
  background:rgba(255,255,255,.32);
  -webkit-backdrop-filter:blur(10px) saturate(140%);backdrop-filter:blur(10px) saturate(140%);
  transition:background .22s,color .22s,transform .2s;
}
.thank-btn:hover{background:var(--azure);color:#fff;transform:translateY(-1px)}
.thank-footer{
  margin-top:2.5rem;padding-top:1.5rem;border-top:1px solid var(--border);
  font-size:0.6rem;font-weight:500;letter-spacing:.08em;color:var(--muted-2);
}
@media(max-width:600px){.thank-card{padding:3rem 1.5rem;border-radius:12px}}
  </style>
</head>
<body>

<div class="thank-wrap">
  <div class="thank-card">
    <div class="thank-icon">✦</div>
    <h1 class="thank-title">Thank <em>You</em></h1>
    <div class="thank-line"></div>
    <p class="thank-body">
      Your enquiry has been received successfully.<br><br>
      A DestinationPick South Asian wedding specialist will be in touch within <strong>24 hours</strong> to craft your perfect celebration.
    </p>
    <p class="thank-note">We can't wait to help you plan the wedding of your dreams.</p>
    <a href="index.html" class="thank-btn">Back to Home</a>
    <div class="thank-footer">DestinationPick × Meliá Weddings</div>
  </div>
</div>

</body>
</html>
